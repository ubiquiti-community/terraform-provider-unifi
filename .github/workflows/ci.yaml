# Terraform Provider testing workflow.
name: Tests

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    paths:
    - "**.go"
    - "go.mod"
    - "go.sum"
    - ".github/workflows/ci.yaml"
  push:
    branches:
    - "main"
    paths:
    - "**.go"
    - "go.mod"
    - "go.sum"
    - ".github/workflows/ci.yaml"

# Testing only needs permissions to read the repository contents.
permissions:
  contents: read

jobs:
  # Ensure project builds before running testing matrix
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go mod download
    - run: go build -v .

  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go generate ./...
    - name: git diff
      run: |
        git diff --compact-summary --exit-code || \
          (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)
  test:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go mod download

    - name: Install gotestsum
      run: go install gotest.tools/gotestsum@v1.13.0

    - name: Run Tests
      if: always()
      run: gotestsum --junitfile junit.xml -- -coverprofile=coverage.txt -covermode=atomic -race -count=1 -v -timeout 120m ./...

    - name: Generate HTML coverage report
      if: always()
      run: go tool cover -html=coverage.txt -o coverage.html

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: coverage-report
        path: |
          coverage.txt
          coverage.html
          junit.xml

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.1.2
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

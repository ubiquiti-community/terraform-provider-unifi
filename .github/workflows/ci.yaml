# Terraform Provider testing workflow.
name: CI/CD

# This GitHub action runs your tests for each pull request and push.
# Optionally, you can turn it on using a schedule for regular testing.
on:
  pull_request:
    paths:
    - "**.go"
    - "go.mod"
    - "go.sum"
    - ".github/workflows/ci.yaml"
  push:
    branches:
    - "main"
    paths:
    - "**.go"
    - "go.mod"
    - "go.sum"
    - ".github/workflows/ci.yaml"

# contents: read is needed to check out the repository.
# id-token: write is needed for Codecov OIDC uploads.
permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: GolangCI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: latest
          # The action tracks golangci-lint `latest`, so new checks can appear
          # without any code change and flag pre-existing debt. Gate PRs on the
          # issues they actually introduce; pre-existing findings are paid down
          # separately rather than blocking every PR.
          only-new-issues: true

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go mod download
    - run: go build -v .

  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go generate ./...
    - name: git diff
      run: |
        git diff --compact-summary --exit-code || \
          (echo; echo "Unexpected difference in directories after code generation. Run 'go generate ./...' command and commit."; exit 1)
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
      with:
        go-version-file: "go.mod"
        cache: true
    - run: go mod download

    - name: Unit tests
      if: always()
      # -race requires cgo; the coverage profile feeds Codecov below.
      run: go tool gotestsum --junitfile junit.xml -- -coverprofile=coverage.txt -covermode=atomic -race -count=1 -timeout 120m -v ./...
      env:
        CGO_ENABLED: "1"

    - name: Generate HTML coverage report
      if: always()
      run: go tool cover -html=coverage.txt -o coverage.html

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: |
          coverage.txt
          coverage.html
          junit.xml

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        use_oidc: true
        flags: unit

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v7
      with:
        use_oidc: true
        flags: unit

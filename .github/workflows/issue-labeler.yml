name: Issue Labeler

# Automatically labels new and reopened issues based on keyword matching,
# then posts a welcome comment asking for the information needed to triage.
#
# For maintainability, label rules are defined in the rules array below.
# Add or adjust regex patterns there as needed.

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write

concurrency:
  group: issue-labeler-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Auto-label and welcome new issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issue = context.payload.issue;
            const num   = issue.number;
            const title = issue.title || '';
            const body  = issue.body  || '';
            const text  = (title + ' ' + body).toLowerCase();

            core.info('Labelling issue #' + num + ': ' + title);

            // ── Label rules ───────────────────────────────────────────────
            // Each entry: { label, pattern } – label is applied when pattern
            // matches the lowercased title+body.  Rules are applied in order;
            // earlier matches do not exclude later ones (multi-label OK).
            const rules = [
              { label: 'bug',           pattern: /\b(bug|error|fail|panic|crash|broken|doesn't work|does not work|exception|traceback)\b/ },
              { label: 'enhancement',   pattern: /\b(feature|enhancement|add support|please add|support for|would (be great|love)|request)\b/ },
              { label: 'documentation', pattern: /\b(doc|docs|documentation|readme|typo|misleading|confusing|clarif)\b/ },
              { label: 'question',      pattern: /\b(question|how (do|to)|does .* work|can i|is (it|there) (possible|a way))\b/ },
            ];

            const labelsToAdd = [];
            for (const { label, pattern } of rules) {
              if (pattern.test(text) && !labelsToAdd.includes(label))
                labelsToAdd.push(label);
            }

            // 'question' should only be added when nothing else matched
            const nonQuestion = labelsToAdd.filter(l => l !== 'question');
            const finalLabels = nonQuestion.length ? nonQuestion : labelsToAdd;

            if (finalLabels.length) {
              core.info('  Adding labels: ' + finalLabels.join(', '));
              await github.rest.issues.addLabels({
                owner, repo, issue_number: num, labels: finalLabels
              });
            }

            // ── Welcome comment ────────────────────────────────────────────
            // Only post once – idempotency marker prevents duplicates on
            // re-opened events.
            const WELCOME_MARKER = '<!-- triage-welcome -->';
            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: num, per_page: 100 },
            );
            if (comments.some(c => c.body && c.body.includes(WELCOME_MARKER))) {
              core.info('  Welcome comment already present, skipping');
              return;
            }

            const typeHint = finalLabels.includes('bug')
              ? 'bug report'
              : finalLabels.includes('enhancement')
                ? 'feature request'
                : finalLabels.includes('documentation')
                  ? 'documentation issue'
                  : 'issue';

            await github.rest.issues.createComment({
              owner, repo, issue_number: num,
              body:
                WELCOME_MARKER + '\n' +
                'Thanks for filing this ' + typeHint + '! 🙏\n\n' +
                'A maintainer will review it shortly. To help us triage faster, please confirm:\n\n' +
                '| | |\n' +
                '|---|---|\n' +
                '| **Provider version** | `terraform providers` or `tofu providers` |\n' +
                '| **UniFi Network Application version** | e.g. `8.x` |\n' +
                '| **Controller type** | UDM Pro / UCG Ultra / USG / … |\n\n' +
                'And include a **minimal reproducible configuration** along with the full error output.\n'
            });

            core.info('  Welcome comment posted');

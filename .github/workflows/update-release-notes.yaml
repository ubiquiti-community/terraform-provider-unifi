name: Update Release Notes

# This workflow updates release descriptions for releases that only have
# "Full Changelog" links in their descriptions.
#
# Trigger manually from the Actions tab to apply the release notes files
# to GitHub releases. Release note content is maintained in the
# scripts/release-notes/ directory.

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - copilot/update-release-descriptions
    paths:
      - 'scripts/release-notes/**'

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update-release-notes.sh

name: Update Release Notes

# This workflow syncs GitHub release descriptions with CHANGELOG.md.
# It fetches all releases dynamically, checks whether each release's
# current description already matches the CHANGELOG entry, and only
# calls `gh release edit` when an update is actually needed.
#
# Trigger manually from the Actions tab, or it runs automatically when
# CHANGELOG.md is updated on the main branch.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync release notes from CHANGELOG.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # ---------------------------------------------------------------------------
          # extract_changelog_section <tag>
          #   Prints the body of the CHANGELOG.md section for <tag>, or nothing if
          #   the tag has no entry.  Each section begins with "## [<tag>]" and ends
          #   at the next "---" separator (or EOF).
          # ---------------------------------------------------------------------------
          extract_changelog_section() {
            local tag="$1"
            # Escape characters that are special in awk regex (e.g. "." in version tags)
            local escaped_tag
            escaped_tag=$(printf '%s\n' "$tag" | sed 's/[[\.*^$()+?{|]/\\&/g')
            awk "/^## \[${escaped_tag}\]/{found=1; next} found && /^---$/{exit} found{print}" CHANGELOG.md \
              | sed -e 's/[[:space:]]*$//' \
              | awk 'BEGIN{started=0} { if (!started && NF==0) next; started=1; print }'
          }

          # ---------------------------------------------------------------------------
          # Fetch every release tag from GitHub (up to 200).
          # gh returns them newest-first by default.
          # ---------------------------------------------------------------------------
          echo "Fetching release list..."
          tags=$(gh release list \
            --repo ubiquiti-community/terraform-provider-unifi \
            --limit 200 \
            --json tagName \
            --jq '.[].tagName')

          updated=0
          skipped_no_entry=0
          skipped_up_to_date=0
          failed=0

          for tag in $tags; do
            # -----------------------------------------------------------------------
            # 1. Extract the CHANGELOG section for this tag.
            #    If there's no entry, leave the release untouched.
            # -----------------------------------------------------------------------
            changelog_body=$(extract_changelog_section "$tag")

            if [ -z "$changelog_body" ]; then
              echo "  –  $tag: no CHANGELOG entry, skipping"
              skipped_no_entry=$((skipped_no_entry + 1))
              continue
            fi

            # -----------------------------------------------------------------------
            # 2. Fetch the current release body from GitHub.
            #    Normalise line-endings and strip trailing whitespace so that minor
            #    formatting differences (CRLF vs LF, trailing spaces) don't trigger
            #    spurious updates.
            # -----------------------------------------------------------------------
            current_body=$(gh release view "$tag" \
              --repo ubiquiti-community/terraform-provider-unifi \
              --json body \
              --jq '.body' \
              | tr -d '\r' \
              | sed -e 's/[[:space:]]*$//')

            # -----------------------------------------------------------------------
            # 3. Compare.  Use checksums so the comparison is whitespace-tolerant.
            # -----------------------------------------------------------------------
            changelog_sum=$(printf '%s' "$changelog_body" | md5sum | awk '{print $1}')
            current_sum=$(printf '%s' "$current_body"   | md5sum | awk '{print $1}')

            if [ "$changelog_sum" = "$current_sum" ]; then
              echo "  ✓  $tag: already up to date, skipping"
              skipped_up_to_date=$((skipped_up_to_date + 1))
              continue
            fi

            # -----------------------------------------------------------------------
            # 4. Descriptions differ — apply the CHANGELOG content.
            # -----------------------------------------------------------------------
            notes_file="/tmp/${tag//\//_}.md"
            printf '%s\n' "$changelog_body" > "$notes_file"

            echo "  ↑  $tag: updating..."
            if gh release edit "$tag" \
              --repo ubiquiti-community/terraform-provider-unifi \
              --notes-file "$notes_file"; then
              echo "     ✓ $tag updated"
              updated=$((updated + 1))
            else
              echo "     ✗ $tag update failed"
              failed=$((failed + 1))
            fi
          done

          echo ""
          summary="Updated: $updated | Already up to date: $skipped_up_to_date | No CHANGELOG entry: $skipped_no_entry | Failed: $failed"
          echo "Done. $summary"

          {
            echo "## Release Notes Sync"
            echo ""
            echo "| Result | Count |"
            echo "| ------ | ----- |"
            echo "| ✅ Updated | $updated |"
            echo "| ✓ Already up to date | $skipped_up_to_date |"
            echo "| – No CHANGELOG entry | $skipped_no_entry |"
            echo "| ✗ Failed | $failed |"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$failed" -gt 0 ]; then
            echo "::error::$failed release(s) failed to update"
            exit 1
          fi

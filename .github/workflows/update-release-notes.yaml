name: Update Release Notes

# This workflow updates release descriptions for releases that only have
# "Full Changelog" links in their descriptions.
#
# Trigger manually from the Actions tab, or it runs automatically when
# CHANGELOG.md is updated on the main branch.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'CHANGELOG.md'

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          update_release() {
            local tag="$1"
            local notes_file="$2"
            echo "Updating $tag..."
            if gh release edit "$tag" \
              --repo ubiquiti-community/terraform-provider-unifi \
              --notes-file "$notes_file"; then
              echo "  ✓ $tag updated"
            else
              echo "  ✗ $tag failed (may not exist as a release)"
            fi
          }

          # ---------------------------------------------------------------------------
          # Extract each release's section from CHANGELOG.md and apply it.
          # Each section runs from its "## [vX.Y.Z]" header to the next "---" separator.
          # ---------------------------------------------------------------------------

          extract_section() {
            local tag="$1"
            local outfile="$2"
            # Escape special characters in the tag for use in sed
            local escaped_tag
            escaped_tag=$(printf '%s\n' "$tag" | sed 's/[[\.*^$()+?{|]/\\&/g')
            awk "/^## \[${escaped_tag}\]/{found=1; next} found && /^---$/{exit} found{print}" CHANGELOG.md > "$outfile"
          }

          extract_section "v0.41.19"     /tmp/v0.41.19.md
          extract_section "v0.41.18"     /tmp/v0.41.18.md
          extract_section "v0.41.17"     /tmp/v0.41.17.md
          extract_section "v0.41.16"     /tmp/v0.41.16.md
          extract_section "v0.41.15"     /tmp/v0.41.15.md
          extract_section "v0.41.14"     /tmp/v0.41.14.md
          extract_section "v0.41.13"     /tmp/v0.41.13.md
          extract_section "v0.41.12"     /tmp/v0.41.12.md
          extract_section "v0.41.11"     /tmp/v0.41.11.md
          extract_section "v0.41.10"     /tmp/v0.41.10.md
          extract_section "v0.41.9"      /tmp/v0.41.9.md
          extract_section "v0.41.8"      /tmp/v0.41.8.md
          extract_section "v0.41.7"      /tmp/v0.41.7.md
          extract_section "v0.41.6"      /tmp/v0.41.6.md
          extract_section "v0.41.5"      /tmp/v0.41.5.md
          extract_section "v0.41.4"      /tmp/v0.41.4.md
          extract_section "v0.41.4-rc3"  /tmp/v0.41.4-rc3.md
          extract_section "v0.41.4-rc2"  /tmp/v0.41.4-rc2.md
          extract_section "v0.41.4-rc1"  /tmp/v0.41.4-rc1.md
          extract_section "v0.41.4-beta2" /tmp/v0.41.4-beta2.md
          extract_section "v0.41.4-beta1" /tmp/v0.41.4-beta1.md
          extract_section "v0.41.3"      /tmp/v0.41.3.md
          extract_section "v0.41.2"      /tmp/v0.41.2.md
          extract_section "v0.41.1"      /tmp/v0.41.1.md

          update_release "v0.41.19"     /tmp/v0.41.19.md
          update_release "v0.41.18"     /tmp/v0.41.18.md
          update_release "v0.41.17"     /tmp/v0.41.17.md
          update_release "v0.41.16"     /tmp/v0.41.16.md
          update_release "v0.41.15"     /tmp/v0.41.15.md
          update_release "v0.41.14"     /tmp/v0.41.14.md
          update_release "v0.41.13"     /tmp/v0.41.13.md
          update_release "v0.41.12"     /tmp/v0.41.12.md
          update_release "v0.41.11"     /tmp/v0.41.11.md
          update_release "v0.41.10"     /tmp/v0.41.10.md
          update_release "v0.41.9"      /tmp/v0.41.9.md
          update_release "v0.41.8"      /tmp/v0.41.8.md
          update_release "v0.41.7"      /tmp/v0.41.7.md
          update_release "v0.41.6"      /tmp/v0.41.6.md
          update_release "v0.41.5"      /tmp/v0.41.5.md
          update_release "v0.41.4"      /tmp/v0.41.4.md
          update_release "v0.41.4-rc3"  /tmp/v0.41.4-rc3.md
          update_release "v0.41.4-rc2"  /tmp/v0.41.4-rc2.md
          update_release "v0.41.4-rc1"  /tmp/v0.41.4-rc1.md
          update_release "v0.41.4-beta2" /tmp/v0.41.4-beta2.md
          update_release "v0.41.4-beta1" /tmp/v0.41.4-beta1.md
          update_release "v0.41.3"      /tmp/v0.41.3.md
          update_release "v0.41.2"      /tmp/v0.41.2.md
          update_release "v0.41.1"      /tmp/v0.41.1.md
